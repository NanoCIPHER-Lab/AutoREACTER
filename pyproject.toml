[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "AutoREACTER"
version = "0.2.0b2"
description = "A toolkit for LAMMPS reaction modeling within MuPT"
authors = [
    {name = "Janitha Mahanthe", email = "jmahanth@stevens.edu"},
    {name = "Jacob Gissinger", email = "jgissing@stevens.edu"},
    ]
license = "MIT"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "pandas",
    "networkx",
    "rdkit",
    "pillow"
]

[tool.setuptools.packages.find]