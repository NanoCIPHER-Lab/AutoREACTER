name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Check syntax
        run: |
          python -m compileall AutoREACTER examples

      - name: Check imports
        run: |
          python -c "import AutoREACTER; print('AutoREACTER import OK')"

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -name "test*.py" | grep -q .; then
            pytest
          else
            echo "No pytest tests found. Skipping pytest."
          fi