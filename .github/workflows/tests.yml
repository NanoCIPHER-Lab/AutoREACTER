name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}, Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Check Python syntax
        run: |
          python -m compileall AutoREACTER AutoREACTER.py

      - name: Smoke import package
        run: |
          python -c "import AutoREACTER; print('AutoREACTER package import OK')"

      - name: Run tests if present
        run: |
          if find . -path "./tests/test*.py" -o -path "./test*.py" | grep -q .; then
            pytest
          else
            echo "No pytest tests found yet. Skipping pytest."
          fi
