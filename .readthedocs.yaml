version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12" # You can update this to 3.12 or 3.13 if AutoREACTER strictly requires it

sphinx:
  builder: html
  configuration: docs/source/conf.py # Updated to match your exact tree structure

python:
  install:
    - requirements: docs/requirements.txt # Matches your docs/requirements.txt
    - method: pip
      path: . # Installs your AutoREACTER package so autodoc can read the docstrings